name: Consume zekt-disciple event & message service

on:
  repository_dispatch:
    types: [zekt-disciple-event]

jobs:
  handle-zekt-disciple-event:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Display event information
        shell: pwsh
        run: |
          $event = '${{ toJson(github.event) }}' | ConvertFrom-Json
          Write-Host "Full Event Object:" -ForegroundColor Cyan
          Write-Host ($event | ConvertTo-Json -Depth 10)

          # - SHOW THE PAYLOAD - VALIDATE PROPERTY VALUES:
          Write-Host ("disciple_input: " + $event.client_payload.zekt.payload.disciple_input) -ForegroundColor Yellow



      - name: Process custom Zekt action / workflow completion
        shell: pwsh
        run: |
          Write-Host "Processing zekt-disciple-event type..." -ForegroundColor Green
          # Add your custom processing logic here
          Write-Host "Workflow completed successfully!" -ForegroundColor Green
