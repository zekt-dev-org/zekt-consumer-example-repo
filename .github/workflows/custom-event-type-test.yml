name: Custom Event Type Test

on:
  repository_dispatch:
    types: [custom-provider-event]

jobs:
  handle-zekt-event:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Display event information
        shell: pwsh
        run: |
          $event = '${{ toJson(github.event) }}' | ConvertFrom-Json
          Write-Host "Full Event Object:" -ForegroundColor Cyan
          Write-Host ($event | ConvertTo-Json -Depth 10)

          # - SHOW THE PAYLOAD - VALIDATE PROPERTY VALUES:
          Write-Host ("resourceType: " + $event.client_payload.zekt.payload.resourceType) -ForegroundColor Yellow
          Write-Host ("department: " + $event.client_payload.zekt.payload.department) -ForegroundColor Yellow
          Write-Host ("size: " + $event.client_payload.zekt.payload.size) -ForegroundColor Yellow


      - name: Process custom Zekt action / workflow completion
        shell: pwsh
        run: |
          Write-Host "Processing custom-provider-event type..." -ForegroundColor Green
          # Add your custom processing logic here
          Write-Host "Workflow completed successfully!" -ForegroundColor Green
