name: Random zekt value verification

on:
  repository_dispatch:
    types: [zekt-random-verification]

jobs:
  handle-zekt-event:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Display event information
        shell: pwsh
        run: |
          $event = '${{ toJson(github.event) }}' | ConvertFrom-Json
          Write-Host "Full Event Object:" -ForegroundColor Cyan
          Write-Host ($event | ConvertTo-Json -Depth 10)

          # - SHOW THE PAYLOAD - VALIDATE PROPERTY VALUES:
          Write-Host ("myPayloadParameter: " + $event.client_payload.zekt.payload.myPayloadParameter) -ForegroundColor Yellow
          if ($event.client_payload.zekt.payload.myPayloadParameter -eq "someRandomValue") {
              Write-Host "Payload parameter value is as expected." -ForegroundColor Green
          } else {
              Write-Host "Payload parameter value is NOT as expected!" -ForegroundColor Red
              throw "Unexpected payload parameter value: $($event.client_payload.zekt.payload.myPayloadParameter)"
          }

      - name: Process custom Zekt action / workflow completion
        shell: pwsh
        run: |
          Write-Host "Processing zekt-random-verification event type..." -ForegroundColor Green
          # Add your custom processing logic here
          Write-Host "Workflow completed successfully!" -ForegroundColor Green
